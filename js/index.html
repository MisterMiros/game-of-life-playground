<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Game of Life Playground</title>
        <link rel="stylesheet" href="style.css" />
        <script type="module" src="script.js" defer></script>
    </head>
    <body>
        <main class="layout">
            <header>
                <h1>Game of Life Playground</h1>
                <p class="description">
                    Seed a random cluster and step through Conway's rules with WebAssembly-powered simulation.
                </p>
            </header>
            <section class="controls">
                <button id="next-generation">Next Generation</button>
                <div class="stats" aria-live="polite">
                    <div>
                        <span>Generation</span>
                        <strong id="generation-count">0</strong>
                    </div>
                    <div>
                        <span>Alive cells</span>
                        <strong id="alive-count">0</strong>
                    </div>
                </div>
            </section>
            <canvas id="game-of-life-canvas" width="800" height="600"></canvas>
            <footer>
                Served locally via <code>python3 -m http.server</code>
            </footer>
        </main>
    </body>
</html>
